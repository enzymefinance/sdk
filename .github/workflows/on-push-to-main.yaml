name: CI
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/reusable-verify.yaml
    secrets: inherit

  verify_environment:
    name: Verify Environment
    uses: ./.github/workflows/reusable-verify-environment.yaml
    secrets: inherit

  docs:
    name: Documentation
    uses: ./.github/workflows/reusable-docs.yaml
    secrets: inherit
    permissions:
      pages: write
      id-token: write

  changesets:
    name: Changesets
    if: github.repository_owner == 'enzymefinance'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
      - name: Update npm
        run: npm install -g npm@latest
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.CHANGESETS_APP_ID }}
          private-key: ${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Manage changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm release
          commit: "chore: publish package(s)"
          title: "chore: publish package(s)"
          commitMode: "github-api"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
